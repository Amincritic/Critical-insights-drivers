# RS232 simulator config.
#
# Use real serial ports or virtual PTY pairs created with socat. Example on macOS/Linux:
#   socat -d -d pty,raw,echo=0,link=/tmp/philips-device pty,raw,echo=0,link=/tmp/philips-gateway
#   socat -d -d pty,raw,echo=0,link=/tmp/draeger-device pty,raw,echo=0,link=/tmp/draeger-gateway
#
# Simulator uses the *device* side. Gateway uses the *gateway* side:
#   ./scripts/run-simulator.sh --config simulator/config/serial-rs232.properties
#   ./scripts/run-gateway.sh --multi --philips-serial /tmp/philips-gateway --draeger-serial /tmp/draeger-gateway --web-port 8081 --stdout compact

device.draeger_rs232_1.type=draeger-medibus
device.draeger_rs232_1.vendor=Draeger
device.draeger_rs232_1.model=Evita V500
device.draeger_rs232_1.transport.type=serial
device.draeger_rs232_1.transport.port=/tmp/draeger-device
device.draeger_rs232_1.transport.model=v500
device.draeger_rs232_1.control-file=/tmp/critical-insights-draeger-rs232.properties

device.philips_mib_1.type=philips-intellivue
device.philips_mib_1.vendor=Philips
device.philips_mib_1.model=MX800
device.philips_mib_1.transport.type=mib-rs232
device.philips_mib_1.transport.port=/tmp/philips-device
device.philips_mib_1.control-file=/tmp/critical-insights-philips-mib-rs232.properties
