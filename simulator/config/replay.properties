# Canonical JSON replay config for deterministic UI/web testing.
# Start the gateway in web-only mode first:
#   ./scripts/run-gateway.sh --web-only --web-port 8099 --stdout false --output-format canonical
# Then start this simulator config:
#   ./scripts/run-simulator.sh --config simulator/config/replay.properties

device.replay_1.type=canonical-replay
device.replay_1.vendor=CriticalInsights
device.replay_1.model=Canonical JSONL Replay
device.replay_1.file=simulator/fixtures/canonical/sample-monitor-events.jsonl
device.replay_1.target-url=http://localhost:8099/api/events
device.replay_1.interval-ms=250
device.replay_1.loop=true
device.replay_1.transport.type=http
device.replay_1.transport.url=http://localhost:8099/api/events
